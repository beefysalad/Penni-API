services:
  postgres:
    image: postgres:16-alpine
    container_name: penni-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: penni
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U penni -d penni"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: penni-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      APP_NAME: Penni API
      HOST: 0.0.0.0
      PORT: 3000
      CORS_ORIGIN: http://localhost:8081,http://localhost:3000
      DATABASE_URL: postgresql://penni:penni@postgres:5432/penni?schema=public
    ports:
      - "3000:3000"

volumes:
  postgres_data:
